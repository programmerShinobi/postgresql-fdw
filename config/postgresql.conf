# =============================================================================
# postgresql.conf — tuned for LAPTOP DEVELOPMENT
# Target host: 4 cores / 8 threads, 16 GB RAM, NVMe SSD, shared with
#              Elasticsearch + Redis + NestJS + IDE.
#
# Philosophy: be a GOOD NEIGHBOUR. We deliberately keep memory modest so the
# OS page cache and other services stay healthy. The Docker container also
# caps total memory at ~1.5 GB, so these values stay well under that.
#
# Rule of thumb used here:
#   shared_buffers        ~= 256 MB   (NOT 25% of host RAM — we don't own it)
#   effective_cache_size  ~= 768 MB   (conservative estimate of OS cache share)
#   work_mem               = 16 MB    (per sort/hash node; keep low w/ many conns)
#   maintenance_work_mem   = 128 MB
# =============================================================================

# ---- Connections -----------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 50            # plenty for dev; use a pooler if you need more
superuser_reserved_connections = 3
password_encryption = scram-sha-256

# ---- Memory ----------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB
hash_mem_multiplier = 2.0
huge_pages = off                # huge pages usually unavailable in dev containers

# ---- WAL / Checkpoints (gentle on SSD write wear) --------------------------
wal_level = replica
wal_buffers = 16MB
min_wal_size = 80MB
max_wal_size = 1GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
wal_compression = on
synchronous_commit = on         # set to 'off' for faster (but riskier) dev writes

# ---- Parallelism (we have 8 threads but share them) ------------------------
max_worker_processes = 8
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# ---- Planner (SSD-aware) ---------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ---- Autovacuum (a touch more aggressive for dev churn) --------------------
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ---- Background / preloaded extensions -------------------------------------
# pg_stat_statements : query performance stats
# pg_cron            : in-database job scheduler
# pgaudit            : audit logging
# pg_hint_plan       : planner hints
# pg_partman_bgw     : partition maintenance background worker
shared_preload_libraries = 'pg_stat_statements,pg_cron,pgaudit,pg_hint_plan,pg_partman_bgw'

# pg_cron must point at the database where its tables live.
cron.database_name = 'ahi_db'

# pg_stat_statements
pg_stat_statements.max = 5000
pg_stat_statements.track = top

# pg_partman background worker
pg_partman_bgw.interval = 3600
pg_partman_bgw.dbname = 'ahi_db'

# ---- Logging (useful for dev, but bounded) ---------------------------------
logging_collector = off         # container captures stderr -> docker logs
log_min_duration_statement = 500ms   # log slow queries (>500ms)
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'Asia/Jakarta'
datestyle = 'iso, mdy'
timezone = 'Asia/Jakarta'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# ---- Statement timeouts (avoid runaway dev queries hogging resources) ------
statement_timeout = 0           # 0 = disabled; set e.g. '60s' if you like
idle_in_transaction_session_timeout = 5min
lock_timeout = 0
